<!DOCTYPE html>
<html><head><title>Welcome</title>
<style>body{margin:0;font-family:Arial;background:maroon;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh}
.c{background:white;color:#333;padding:40px;border-radius:10px;text-align:center;max-width:420px}
h1{color:maroon;margin-top:0}b{color:maroon}a{display:inline-block;margin-top:18px;background:maroon;color:white;padding:10px 18px;border-radius:5px;text-decoration:none}</style></head>
<body><div class="c">
<h1>Welcome, Student!</h1>
<p><b>Name:</b> <span id="n"></span></p>
<p><b>Student No:</b> <span id="num"></span></p>
<p><b>Section:</b> <span id="sec"></span></p>
<a href="login.html">Log Out</a></div>
<script>
const s = JSON.parse(localStorage.getItem("currentStudent")||"{}");
n.textContent=s.name||"";num.textContent=s.number||"";sec.textContent=s.section||"";
</script></body></html>
